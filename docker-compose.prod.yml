services:
  web:
    image: ghcr.io/${GITHUB_REPOSITORY:-tu-usuario/landinginsecap}:latest
    container_name: insecap-landing
    restart: unless-stopped
    ports:
      # Expone solo en localhost; tu reverse proxy (Traefik/Nginx/Caddy)
      # del host hara el TLS y el routing del dominio insecap.cl.
      - "127.0.0.1:8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
